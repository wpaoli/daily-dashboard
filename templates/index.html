<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <style>
    body {
      background-color: #c0c0c0;
      font-family: Times New Roman, Times, serif;
      color: #000000;
      margin: 8px;
    }

    h1 {
      font-size: 1.4rem;
      margin: 0 0 4px 0;
    }

    .date-line {
      font-size: 1rem;
      color: #444;
    }

    .day-count {
      font-size: 4rem;
      font-weight: bold;
      color: #000080;
      line-height: 1;
      margin: 8px 0 4px 0;
    }

    .day-label {
      font-size: 1rem;
      color: #333;
    }

    hr {
      border: 2px inset #808080;
      margin: 12px 0;
    }

    .section {
      max-width: 500px;
      margin: 8px 0;
    }
  </style>
</head>
<body>

  <h1 id="date-heading"></h1>
  <div class="date-line" id="date-line"></div>
  <div class="day-count" id="day-count"></div>
  <div class="day-label" id="day-label"></div>

  <hr>

  <script>
    const now = new Date();

    const fullDate = now.toLocaleDateString('en-US', {
      weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
    });

    const startOfYear = new Date(now.getFullYear(), 0, 1);
    const dayOfYear = Math.floor((now - startOfYear) / (1000 * 60 * 60 * 24)) + 1;
    const daysInYear = ((now.getFullYear() % 4 === 0 && now.getFullYear() % 100 !== 0) || now.getFullYear() % 400 === 0) ? 366 : 365;
    const remaining = daysInYear - dayOfYear;

    document.getElementById('date-heading').textContent = fullDate;
    document.getElementById('day-count').textContent = dayOfYear;
    document.getElementById('day-label').textContent = `day of ${now.getFullYear()} — ${remaining} days remaining`;
  </script>

</body>
</html>
