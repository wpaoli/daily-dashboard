<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: #0f0f13;
      color: #e8e8e8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
    }

    #date-heading {
      font-size: 1.1rem;
      font-weight: 400;
      color: #aaa;
      letter-spacing: 0.08em;
      margin-bottom: 16px;
    }

    .day-count {
      font-size: 10rem;
      font-weight: 700;
      line-height: 1;
      color: #ffffff;
      margin: 8px 0;
      letter-spacing: -4px;
    }

    .day-label {
      font-size: 0.95rem;
      color: #555;
      letter-spacing: 0.03em;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>{{ full_date }}</h1>
    <div class="day-count">{{ day_of_year }}</div>
    <div class="day-label">{{ days_remaining }} days remaining in {{ year }}</div>
  </div>


</body>
</html>
